# ─────────────────────────────────────────────────────────────
# nginx-plesk.conf — Directives Nginx supplémentaires
# À coller dans : Plesk → nana-therese-ba.com →
#   Apache & nginx Settings → nginx Directives supplémentaires
# ─────────────────────────────────────────────────────────────

# Proxy /api/* → backend Node.js (port 3001)
location /api/ {
    proxy_pass                  http://127.0.0.1:3001;
    proxy_http_version          1.1;
    proxy_set_header            Upgrade           $http_upgrade;
    proxy_set_header            Connection        'upgrade';
    proxy_set_header            Host              $host;
    proxy_set_header            X-Real-IP         $remote_addr;
    proxy_set_header            X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header            X-Forwarded-Proto $scheme;
    proxy_pass_request_body     on;
    proxy_pass_request_headers  on;
    proxy_cache_bypass          $http_upgrade;
    proxy_read_timeout          60s;
}

# Proxy /bac/* → SPA React (servie par Laravel)
# Laravel redirige /bac vers la page PHP qui monte l'app React
location /bac {
    try_files $uri /index.php?$query_string;
}

# Gzip
gzip on;
gzip_types text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml;
gzip_min_length 1000;

# Cache assets statiques buildés par Vite
location ~* /build/assets/ {
    expires 1y;
    add_header Cache-Control "public, immutable";
    access_log off;
}
